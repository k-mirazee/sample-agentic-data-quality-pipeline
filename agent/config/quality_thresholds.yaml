# Quality check thresholds — used by scan_quality to score data
# Percentages represent the violation rate that triggers each severity level

thresholds:
  completeness:
    critical: 5.0   # >5% nulls in required field = CRITICAL
    warning: 2.0    # >2% nulls = WARNING
    required_columns:
      - passenger_count
      - fare_amount
      - payment_type
      - tpep_pickup_datetime
      - tpep_dropoff_datetime

  uniqueness:
    critical: 10.0  # >10% duplicate rows = CRITICAL
    warning: 5.0    # >5% = WARNING
    key_columns:
      - VendorID+tpep_pickup_datetime+tpep_dropoff_datetime+PULocationID

  freshness:
    critical_hours: 72
    warning_hours: 24

  distribution:
    passenger_count: { min: 0, max: 9 }
    fare_amount: { min: 0, max: 500 }
    trip_distance: { min: 0, max: 200 }
    total_amount: { min: 0, max: 1000 }
    RatecodeID: { allowed_values: [1, 2, 3, 4, 5, 6] }
    payment_type: { allowed_values: [1, 2, 3, 4, 5, 6] }
    store_and_fwd_flag: { allowed_values: ["Y", "N"] }
